name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAP_REPO: 3ux1n3/homebrew-tap
      TAP_PATH: homebrew-tap
      TAP_FORMULA: Formula/agsm.rb

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            STAGE_DIR="dist/agsm_${VERSION}_${GOOS}_${GOARCH}"
            ARCHIVE="dist/agsm_${VERSION}_${GOOS}_${GOARCH}.tar.gz"

            mkdir -p "${STAGE_DIR}"
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${STAGE_DIR}/agsm" \
              ./main.go
            tar -C "${STAGE_DIR}" -czf "${ARCHIVE}" agsm
          done

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out Homebrew tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: ${{ env.TAP_PATH }}

      - name: Update Homebrew formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NUMBER="${VERSION#v}"
          DARWIN_ARM64_SHA=$(grep "agsm_${VERSION}_darwin_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')
          DARWIN_AMD64_SHA=$(grep "agsm_${VERSION}_darwin_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "agsm_${VERSION}_linux_arm64.tar.gz" dist/checksums.txt | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep "agsm_${VERSION}_linux_amd64.tar.gz" dist/checksums.txt | awk '{print $1}')

          cat <<EOF > "${TAP_PATH}/${TAP_FORMULA}"
          class Agsm < Formula
            desc "Terminal UI for managing AI coding-agent sessions"
            homepage "https://github.com/3ux1n3/agsm"
            version "${VERSION_NUMBER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/3ux1n3/agsm/releases/download/v#{version}/agsm_v#{version}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "https://github.com/3ux1n3/agsm/releases/download/v#{version}/agsm_v#{version}_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/3ux1n3/agsm/releases/download/v#{version}/agsm_v#{version}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/3ux1n3/agsm/releases/download/v#{version}/agsm_v#{version}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "agsm"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agsm --version")
            end
          end
          EOF

      - name: Commit Homebrew formula update
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git -C "${TAP_PATH}" add "${TAP_FORMULA}"
          if git -C "${TAP_PATH}" diff --cached --quiet; then
            exit 0
          fi
          git -C "${TAP_PATH}" config user.name "github-actions[bot]"
          git -C "${TAP_PATH}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${TAP_PATH}" commit -m "agsm ${VERSION}"
          git -C "${TAP_PATH}" push
